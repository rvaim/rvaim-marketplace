interface:
  display_name: "Agent Worker"
  short_description: "用 worker agent 承担复杂实现，主 agent 负责规划与审查。"
  brand_color: "#0F766E"
  default_prompt: "使用 Agent Worker 把复杂任务拆给 worker agent，实现后由主 agent 审查 diff 并决定是否打回。默认优先使用 context_mode=reference 和 response_mode=summary 来节省主上下文 token；只要 run_worker 使用 no_wait=true，状态查询就必须遵守固定 300 秒间隔，不能自行估算时间。"

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "agent-worker"
      description: "agent-worker-mcp server for run_worker, revise_worker, read_worker_result, status, patch application, and cleanup"
      transport: "stdio"
